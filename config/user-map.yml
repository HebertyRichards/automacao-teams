
# PRECEDÊNCIA do e-mail (login -> email):
#   1º SSO/SAML (fonte PRINCIPAL, automático)  ->  2º users: abaixo (FALLBACK)
#   ->  3º convenção email_domain.
# Ou seja: com o SSO ligado, este "users:" só é usado pra quem o SSO NÃO resolver.
users:
  HebertyRichards: hebertylima@geeknine.onmicrosoft.com
  Heberyn: hebertylima@geeknine.onmicrosoft.com

# Convenção automática (opcional) — DESCOMENTE para NÃO precisar listar todo mundo:
# qualquer login do GitHub vira {login}@geeknine.onmicrosoft.com.
# ⚠️ SÓ funciona se o login do GitHub == prefixo do e-mail real (ex.: login
#    "joao.silva" + e-mail "joao.silva@geeknine"). Se não bate (ex.: login
#    "HebertyRichards" -> "hebertylima@..."), use as exceções em "users" acima.
# email_domain: geeknine.onmicrosoft.com

# GitHub Enterprise + SSO (SAML): o e-mail real de cada pessoa é buscado
# AUTOMATICAMENTE pela API GraphQL do GitHub (src/sso.py). Basta definir o
# secret SSO_TOKEN (PAT/GitHub App com admin:org). As exceções em "users:" acima
# têm PRIORIDADE sobre o SSO. Veja a seção "SSO" no README.

# Aprovadores individuais @mencionados no canal quando uma PR é aberta.
# Mesmo formato do "users:" -> Nome: email  (Nome = texto exibido na @menção)
approvers:
  Heberty: hebertylima@geeknine.onmicrosoft.com
  Fulano: fulano@geeknine.onmicrosoft.com

# Time(s) revisor(es) @mencionado(s) junto dos aprovadores (ex.: QA, DevOps).
# Mesmo formato -> NomeDoTime: email (do time/DL)
reviewers:
  QA: qa@geeknine.onmicrosoft.com
  DevOps: devops@geeknine.onmicrosoft.com

