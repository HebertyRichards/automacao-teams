name: PR Teams Notify (reusable)

# Workflow reutilizável: o repo grande chama este via `uses:`.
# Toda a lógica (Python) mora aqui; o repo grande só precisa de um arquivo
# mínimo (veja examples/teams-pr-notifier.yml).

on:
  workflow_call:
    inputs:
      user_map_path:
        description: "Caminho (no repo chamador) do mapa github->email"
        type: string
        required: false
        default: "config/user-map.yml"
      automation_repo:
        description: "owner/repo desta automação"
        type: string
        required: false
        default: "SEU-USUARIO/automacao-teams"
      automation_ref:
        description: "Tag/branch desta automação a usar"
        type: string
        required: false
        default: "v1"
    secrets:
      TEAMS_CHANNEL_WEBHOOK:
        required: true
      TEAMS_DM_WEBHOOK:
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da automação (código Python)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.automation_repo }}
          ref: ${{ inputs.automation_ref }}
          path: _automacao

      - name: Checkout do repo chamador (para o mapeamento)
        uses: actions/checkout@v4
        with:
          path: _caller

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r _automacao/requirements.txt

      - name: Executar notificador
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TEAMS_CHANNEL_WEBHOOK: ${{ secrets.TEAMS_CHANNEL_WEBHOOK }}
          TEAMS_DM_WEBHOOK: ${{ secrets.TEAMS_DM_WEBHOOK }}
          USER_MAP_PATH: _caller/${{ inputs.user_map_path }}
        run: python _automacao/src/main.py
