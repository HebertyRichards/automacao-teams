# ============================================================================
# COPIE ESTE ARQUIVO para o repo grande em:
#   .github/workflows/teams-pr-notifier.yml
#
# Antes de usar:
# 1. Troque SEU-USUARIO/automacao-teams pelo owner/repo real desta automação.
# 2. Cadastre os secrets no repo grande (Settings > Secrets and variables > Actions):
#       TEAMS_CHANNEL_WEBHOOK  (obrigatório)
#       TEAMS_DM_WEBHOOK       (opcional — só se quiser DM pro autor)
# 3. Crie o arquivo config/user-map.yml no repo grande (veja o exemplo).
# ============================================================================

name: Teams PR Notifications

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]
  pull_request_review:
    types: [submitted]
  schedule:
    - cron: "0 12 * * 1-5"   # lista de PRs abertas, dias úteis 12:00 UTC
  workflow_dispatch:          # permite rodar a lista manualmente

jobs:
  teams:
    uses: SEU-USUARIO/automacao-teams/.github/workflows/pr-teams-notify.yml@v1
    secrets: inherit
    # Opcional: sobrescrever defaults
    # with:
    #   user_map_path: config/user-map.yml
